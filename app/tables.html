<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CORTEX Tables</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
    --text: #e2e8f0; --muted: #8892a4; --accent: #b58ebf;
    --ok: #4ade80; --err: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: .05em; color: var(--accent); }
  header a { color: var(--muted); text-decoration: none; font-size: 12px; }
  header a:hover { color: var(--accent); }
  #status { font-size: 12px; color: var(--muted); min-height: 16px; }
  #status.ok { color: var(--ok); }
  #status.err { color: var(--err); }
  main { max-width: 1200px; margin: 0 auto; padding: 16px; }
  section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 4px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr.new-row td { border-top: 1px dashed var(--border); }
  input[type=text], input[type=number], select {
    background: #1e2235; border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 4px 6px; font-size: 12px; font-family: inherit;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  button.act { background: none; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); cursor: pointer; padding: 3px 8px; font-size: 11px; white-space: nowrap; }
  button.act:hover { border-color: var(--accent); color: var(--accent); }
  button.act.danger:hover { border-color: var(--err); color: var(--err); }
  button.act.primary { border-color: var(--accent); color: var(--accent); }
  .actions { display: flex; gap: 6px; }
  td.actions, th.actions { position: sticky; left: 0; background: var(--surface); z-index: 1; }
</style>
</head>
<body>
<header>
  <h1>CORTEX — Items</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="status"></span>
    <button class="act" onclick="exportDb()">Export DB</button>
    <button class="act" onclick="document.getElementById('import-file').click()">Import DB</button>
    <input type="file" id="import-file" accept=".db" style="display:none" onchange="importDb(this.files[0])">
    <a href="/dashboard">&larr; Dashboard</a>
  </div>
</header>
<main>
  <section><div id="table-container">Loading…</div></section>
</main>

<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

// captures/vault/archive are pipeline-owned or secret — items is the only editable table.
const COLUMNS = [
  {key:'type', type:'select', options:['task','event','note','idea','question','asset'], required:true},
  {key:'content', type:'text', required:true, wide:true},
  {key:'priority', type:'select', options:['low','normal','high']},
  {key:'tags', type:'text'},                 // JSON array or comma list; server normalizes
  {key:'due_ts', type:'number'},
  {key:'status', type:'select', options:['new','todo','open','tracked','someday','done']},
  {key:'kind', type:'select', options:['','income','expense','subscription','one-off']},
  {key:'recurrence', type:'select', options:['','daily','weekly','monthly']},
  {key:'snoozed_until_ts', type:'number'},
  {key:'duplicate_of', type:'number'},
];

function showStatus(msg, isErr) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = msg ? (isErr ? 'err' : 'ok') : '';
}

async function api(path, method, body) {
  const opts = {method: method || 'GET'};
  if (body !== undefined) {
    opts.headers = {'Content-Type': 'application/json'};
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(path, opts);
  const d = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(d.detail || ('HTTP ' + r.status));
  return d;
}

function fieldId(rowId, key) { return `f-${rowId}-${key}`; }

function renderField(col, rowId, value) {
  const id = fieldId(rowId, col.key);
  if (col.type === 'select') {
    const opts = col.options.map(o =>
      `<option value="${esc(o)}"${o === (value ?? '') ? ' selected' : ''}>${esc(o) || '—'}</option>`
    ).join('');
    return `<select id="${id}">${opts}</select>`;
  }
  if (col.type === 'number') {
    return `<input type="number" id="${id}" step="1" value="${value ?? ''}" style="width:110px">`;
  }
  const val = col.key === 'tags' && Array.isArray(value) ? value.join(', ') : (value ?? '');
  return `<input type="text" id="${id}" value="${esc(val)}" style="width:${col.wide ? 320 : 140}px">`;
}

function collectField(col, rowId) {
  const el = document.getElementById(fieldId(rowId, col.key));
  if (col.type === 'number') return el.value === '' ? null : Number(el.value);
  if (col.type === 'select') return el.value === '' ? null : el.value;
  return el.value;
}

async function loadTable() {
  showStatus('Loading…');
  try {
    const rows = await api('/api/items');
    renderTable(rows);
    showStatus('');
  } catch (e) {
    showStatus('Error: ' + e.message, true);
    document.getElementById('table-container').innerHTML = '<p style="color:var(--err)">Failed to load.</p>';
  }
}

function renderTable(rows) {
  const thead = COLUMNS.map(c => `<th>${esc(c.key)}</th>`).join('');
  const body = rows.map(r => {
    const cells = COLUMNS.map(c => `<td>${renderField(c, r.id, r[c.key])}</td>`).join('');
    return `<tr>
      <td style="color:var(--muted)">${r.id}</td>
      <td class="actions">
        <button class="act primary" onclick="saveRow(${r.id})">Save</button>
        <button class="act danger" onclick="deleteRow(${r.id})">Delete</button>
      </td>
      ${cells}
    </tr>`;
  }).join('');
  const newCells = COLUMNS.map(c => `<td>${renderField(c, 'new', '')}</td>`).join('');
  const newRow = `<tr class="new-row">
    <td style="color:var(--muted)">new</td>
    <td class="actions"><button class="act primary" onclick="addRow()">Add</button></td>
    ${newCells}
  </tr>`;
  document.getElementById('table-container').innerHTML = `
    <table>
      <thead><tr><th>id</th><th class="actions"></th>${thead}</tr></thead>
      <tbody>${body || `<tr><td colspan="${COLUMNS.length + 2}" style="color:var(--muted)">No items yet.</td></tr>`}${newRow}</tbody>
    </table>`;
}

async function saveRow(rowId) {
  const body = {};
  COLUMNS.forEach(c => { body[c.key] = collectField(c, rowId); });
  try {
    await api(`/api/items/${rowId}`, 'PUT', body);
    showStatus('Saved.');
    loadTable();
  } catch (e) { showStatus('Error: ' + e.message, true); }
}

async function deleteRow(rowId) {
  if (!confirm(`Delete item #${rowId}?`)) return;
  try {
    await api(`/api/items/${rowId}`, 'DELETE');
    showStatus('Deleted.');
    loadTable();
  } catch (e) { showStatus('Error: ' + e.message, true); }
}

async function addRow() {
  const body = {};
  COLUMNS.forEach(c => {
    const v = collectField(c, 'new');
    // Leave blank optional fields out so the column's SQL default applies.
    if (v === null || v === '') return;
    body[c.key] = v;
  });
  try {
    await api('/api/items', 'POST', body);
    showStatus('Added.');
    loadTable();
  } catch (e) { showStatus('Error: ' + e.message, true); }
}

function exportDb() {
  window.location.href = '/api/export';
}

async function importDb(file) {
  if (!file) return;
  if (!confirm(`Replace the live database with "${file.name}"? The current one is backed up first, but this switches all data immediately.`)) {
    document.getElementById('import-file').value = '';
    return;
  }
  showStatus('Importing…');
  try {
    const form = new FormData();
    form.append('file', file);
    const r = await fetch('/api/import', {method: 'POST', body: form});
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d.detail || ('HTTP ' + r.status));
    showStatus(`Imported. Previous db backed up to ${d.backup}.`);
    loadTable();
  } catch (e) {
    showStatus('Error: ' + e.message, true);
  } finally {
    document.getElementById('import-file').value = '';
  }
}

loadTable();
</script>
</body>
</html>
